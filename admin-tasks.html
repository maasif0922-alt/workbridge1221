<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Task Approvals | WorkBridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/auth-guard.js"></script>
    <style>
        .admin-card {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            margin-top: 2rem;
            overflow-x: auto;
        }

        .payment-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            min-width: 800px;
        }

        .payment-table th,
        .payment-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .payment-table th {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            background: #f8fafc;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .status-approved {
            background: #dcfce7;
            color: #166534;
        }

        .status-pending {
            background: #fffbe6;
            color: #d4a017;
        }

        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body style="background: #f1f5f9;">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-bridge-water"></i>
                Work<span>Bridge</span> <span
                    style="font-weight: 400; color: var(--text-secondary); margin-left:10px;">| Admin</span>
            </a>
            <div class="nav-links">
                <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i> Main Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header style="margin-top: 4rem;">
            <h1 style="font-size: 2.5rem; font-weight: 800;"><i class="fa-solid fa-list-check"></i> Earning Task
                Approvals</h1>
            <p style="color: var(--text-secondary);">Review promotional task proof screenshots from users and credit
                points.</p>
        </header>

        <div class="admin-card">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <h2 style="font-size: 1.25rem;">Pending Screenshot Proofs</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="loadTasks()">Refresh <i
                            class="fa-solid fa-rotate-right"></i></button>
                    <button class="btn btn-primary" onclick="clearAllData()">Clear All Data (Dev Only)</button>
                </div>
            </div>

            <table class="payment-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User Name (Email)</th>
                        <th>Plan</th>
                        <th>Task Name</th>
                        <th>Proof (Image)</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="task-list">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="image-modal" class="modal-overlay" style="display: none; z-index: 9999;">
        <div class="donation-modal" style="max-width: 600px; text-align: center;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 id="image-modal-title">Proof Screenshot</h3>
                <button onclick="closeImageModal()"
                    style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <img id="image-modal-src" src="" alt="Proof"
                style="max-width: 100%; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
        </div>
    </div>

    <script>
        // Use a static placeholder image for uploaded proofs since we can't save real files in localStorage easily without base64 bloat
        const placeholderImg = "https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&w=400&q=80";

        function loadTasks() {
            const list = document.getElementById('task-list');
            const tasks = JSON.parse(localStorage.getItem('admin_pending_tasks') || '[]');

            if (tasks.length === 0) {
                list.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 2rem; color: var(--text-secondary);">No pending tasks found.</td></tr>';
                return;
            }

            // Sort so pending is at the top
            tasks.sort((a, b) => {
                if (a.status === 'Pending' && b.status !== 'Pending') return -1;
                if (a.status !== 'Pending' && b.status === 'Pending') return 1;
                return 0;
            });

            list.innerHTML = tasks.map((task, index) => {
                let statusClass = 'status-pending';
                if (task.status === 'Approved') statusClass = 'status-approved';
                if (task.status === 'Rejected') statusClass = 'status-rejected';

                let actionHtml = '';
                if (task.status === 'Pending') {
                    actionHtml = `
                        <button class="btn btn-primary btn-sm" onclick="approveTask('${task.id}')"><i class="fa-solid fa-check"></i> Approve (+${task.reward})</button>
                        <button class="btn btn-secondary btn-sm" onclick="rejectTask('${task.id}')" style="background:#fee2e2; color:#991b1b; border-color:#fee2e2;"><i class="fa-solid fa-xmark"></i></button>
                    `;
                } else {
                    actionHtml = `<span style="color: var(--text-secondary); font-size: 0.85rem;">Processed</span>`;
                }

                return `
                <tr>
                    <td>${task.date}</td>
                    <td><strong>${task.userName}</strong><br><span style="font-size:0.8rem;color:gray;">${task.userEmail}</span></td>
                    <td><span class="badge" style="background:#e0f2fe; color:#0369a1;">${task.planName}</span></td>
                    <td>${task.taskTitle}</td>
                    <td>
                        <button onclick="viewImage('${task.taskTitle}')" style="background:none; border:none; color:var(--primary-color); cursor:pointer; text-decoration:underline;">
                            <i class="fa-solid fa-image"></i> View Image
                        </button>
                    </td>
                    <td><span class="status-badge ${statusClass}">${task.status}</span></td>
                    <td>${actionHtml}</td>
                </tr>
            `}).join('');
        }

        function approveTask(id) {
            let tasks = JSON.parse(localStorage.getItem('admin_pending_tasks') || '[]');
            const taskIndex = tasks.findIndex(t => t.id === id);

            if (taskIndex > -1) {
                tasks[taskIndex].status = 'Approved';
                localStorage.setItem('admin_pending_tasks', JSON.stringify(tasks));

                alert(`Task Approved! The user (${tasks[taskIndex].userName}) has been simulated to receive +${tasks[taskIndex].reward} points. In a real system, the backend would update their account balance now.`);

                // In a perfect mock, we'd find the exact profile in localStorage based on email, 
                // but since our earning_profile is globally shared for the singular active mocked user in JS,
                // we'll update it *if* this user is currently logged in.
                const currentUser = JSON.parse(localStorage.getItem('workbridge_user') || '{}');
                if (currentUser.email === tasks[taskIndex].userEmail) {
                    let profile = JSON.parse(localStorage.getItem('earning_profile') || '{}');
                    if (profile.points !== undefined) {
                        profile.points += tasks[taskIndex].reward;
                        if (!profile.completedTasks) profile.completedTasks = [];
                        profile.completedTasks.push(tasks[taskIndex].taskId);
                        localStorage.setItem('earning_profile', JSON.stringify(profile));
                    }
                }

                loadTasks();
            }
        }

        function rejectTask(id) {
            if (confirm("Are you sure you want to reject this proof? The user will not get points.")) {
                let tasks = JSON.parse(localStorage.getItem('admin_pending_tasks') || '[]');
                const taskIndex = tasks.findIndex(t => t.id === id);

                if (taskIndex > -1) {
                    tasks[taskIndex].status = 'Rejected';
                    localStorage.setItem('admin_pending_tasks', JSON.stringify(tasks));
                    loadTasks();
                }
            }
        }

        function clearAllData() {
            if (confirm("Dev Action: Are you sure you want to clear ALL dummy tasks?")) {
                localStorage.removeItem('admin_pending_tasks');
                loadTasks();
            }
        }

        function viewImage(title) {
            document.getElementById('image-modal-title').textContent = title + " (Mock Proof)";
            document.getElementById('image-modal-src').src = placeholderImg;
            document.getElementById('image-modal').style.display = 'flex';
        }

        function closeImageModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', loadTasks);
    </script>
</body>

</html>
