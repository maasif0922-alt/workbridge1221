<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBridge Admin - Manage News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/auth-guard.js"></script>
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .news-list-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            height: fit-content;
        }

        .news-list-header {
            padding: 1rem;
            background: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-item-row {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
        }

        .news-item-row:hover {
            background: #f1f5f9;
        }

        .news-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .news-item-content {
            flex: 1;
            min-width: 0;
        }

        .news-item-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-delete-small {
            color: #94a3b8;
            padding: 5px;
            transition: var(--transition);
            border-radius: 4px;
        }

        .btn-delete-small:hover {
            color: #ef4444;
            background: #fee2e2;
        }

        .news-item-row.active {
            background: #eff6ff;
            border-left: 4px solid var(--primary-color);
        }

        .news-editor-card {
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-full {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
        }

        .btn-publish {
            background: #10b981;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            margin-top: 2rem;
        }

        .preview-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: var(--radius-lg);
        }
    </style>
</head>

<body style="background: #f1f5f9;">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-bridge-water"></i>
                Work<span>Bridge</span> <span
                    style="font-weight: 400; color: var(--text-secondary); margin-left:10px;">| Admin</span>
            </a>
            <div class="nav-links">
                <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-bottom: 4rem;">
        <header style="margin-top: 4rem; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 2.5rem; font-weight: 800;">News Management</h1>
                <p style="color: var(--text-secondary);">Add, edit, and publish platform updates.</p>
            </div>
            <button class="btn btn-primary" onclick="createNewItem()"><i class="fa-solid fa-plus"></i> New
                Article</button>
        </header>

        <div class="admin-layout">
            <!-- Sidebar: List of News -->
            <div class="news-list-card">
                <div class="news-list-header">
                    <span style="font-weight: 700;">All Articles</span>
                    <span id="article-count" class="badge">0</span>
                </div>
                <div id="news-list-container">
                    <!-- Loaded via JS -->
                </div>
            </div>

            <!-- Editor Side -->
            <div>
                <div class="news-editor-card">
                    <form id="news-form">
                        <div class="form-grid">
                            <div class="form-group form-full">
                                <label>Article Title</label>
                                <input type="text" id="news-title" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <select id="news-category" class="form-control">
                                    <option value="Platform">Platform Update</option>
                                    <option value="Career Advice">Career Advice</option>
                                    <option value="Market Trends">Market Trends</option>
                                    <option value="Announcement">Announcement</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Date</label>
                                <input type="text" id="news-date" class="form-control"
                                    placeholder="e.g. February 27, 2026">
                            </div>
                            <div class="form-group form-full">
                                <label>Image URL</label>
                                <input type="url" id="news-image" class="form-control" required>
                            </div>
                            <div class="form-group form-full">
                                <label>Summary / Excerpt</label>
                                <textarea id="news-summary" class="form-control" rows="4" required></textarea>
                            </div>
                            <div class="form-group form-full">
                                <label>Detail Link (or ID)</label>
                                <input type="text" id="news-link" class="form-control" value="news-detail.html">
                            </div>
                        </div>

                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="button" class="btn" style="flex: 1; border: 1px solid var(--border-color);"
                                onclick="deleteItem()">Delete Item</button>
                            <button type="submit" class="btn btn-primary" style="flex: 2;">Save Changes</button>
                        </div>
                    </form>

                    <button class="btn-publish" onclick="publishAll()">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Publish to Live Site (Download news-data.js)
                    </button>
                </div>

                <div class="preview-box">
                    <h4 style="margin-bottom: 1rem; color: var(--text-secondary);"><i class="fa-solid fa-eye"></i> Quick
                        Preview</h4>
                    <div id="quick-preview-container">
                        <!-- Preview Card -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/news-data.js"></script>
    <script>
        let currentNews = [];
        let activeId = null;

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('workbridge_news');
            if (saved) {
                currentNews = JSON.parse(saved);
            } else if (window.newsData) {
                currentNews = [...window.newsData];
            }

            renderList();
            if (currentNews.length > 0) selectItem(currentNews[0].id);
        });

        function renderList() {
            const container = document.getElementById('news-list-container');
            const countLabel = document.getElementById('article-count');
            countLabel.textContent = currentNews.length;

            container.innerHTML = currentNews.map(item => `
                <div class="news-item-row ${item.id === activeId ? 'active' : ''}" onclick="selectItem('${item.id}')">
                    <div class="news-item-content">
                        <div class="news-item-title">${item.title}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">${item.date} | ${item.category}</div>
                    </div>
                    <button class="btn-delete-small" onclick="event.stopPropagation(); deleteItem('${item.id}')">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `).join('');
        }

        function selectItem(id) {
            activeId = id;
            const item = currentNews.find(n => n.id === id);
            if (!item) return;

            document.getElementById('news-title').value = item.title;
            document.getElementById('news-category').value = item.category;
            document.getElementById('news-date').value = item.date;
            document.getElementById('news-image').value = item.image;
            document.getElementById('news-summary').value = item.summary;
            document.getElementById('news-link').value = item.link;

            renderList();
            updatePreview();
        }

        function createNewItem() {
            const newId = 'news-' + Date.now();
            const newItem = {
                id: newId,
                title: "New Article Title",
                date: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }),
                category: "Announcement",
                summary: "Give your readers a brief summary of the article contents here...",
                image: "https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?auto=format&fit=crop&q=80&w=400",
                link: "news-detail.html"
            };
            currentNews.unshift(newItem);
            activeId = newId;
            renderList();
            selectItem(newId);
        }

        function deleteItem(id = null) {
            const targetId = id || activeId;
            if (!targetId) return;

            if (!confirm('Are you sure you want to delete this article?')) return;
            currentNews = currentNews.filter(n => n.id !== targetId);
            localStorage.setItem('workbridge_news', JSON.stringify(currentNews));

            if (currentNews.length > 0) {
                if (targetId === activeId) {
                    selectItem(currentNews[0].id);
                } else {
                    renderList();
                }
            } else {
                activeId = null;
                document.getElementById('news-form').reset();
                renderList();
            }
        }

        document.getElementById('news-form').onsubmit = (e) => {
            e.preventDefault();
            const index = currentNews.findIndex(n => n.id === activeId);
            if (index === -1) return;

            currentNews[index] = {
                id: activeId,
                title: document.getElementById('news-title').value,
                category: document.getElementById('news-category').value,
                date: document.getElementById('news-date').value,
                image: document.getElementById('news-image').value,
                summary: document.getElementById('news-summary').value,
                link: document.getElementById('news-link').value
            };

            localStorage.setItem('workbridge_news', JSON.stringify(currentNews));
            alert('Settings saved locally! Click Publish to download the actual data file.');
            renderList();
            updatePreview();
        };

        function updatePreview() {
            const preview = document.getElementById('quick-preview-container');
            const title = document.getElementById('news-title').value;
            const cat = document.getElementById('news-category').value;
            const date = document.getElementById('news-date').value;
            const img = document.getElementById('news-image').value;
            const summ = document.getElementById('news-summary').value;

            preview.innerHTML = `
                <div class="news-card" style="margin: 0; max-width: 400px; box-shadow: var(--shadow-md);">
                    <div class="news-image">
                        <img src="${img}" alt="Preview">
                        <span class="news-category">${cat}</span>
                    </div>
                    <div class="news-body">
                        <div class="news-date">${date}</div>
                        <h3 class="news-title" style="font-size: 1.1rem;">${title}</h3>
                        <p class="news-text">${summ}</p>
                    </div>
                </div>
            `;
        }

        function publishAll() {
            const dataStr = "const defaultNewsData = " + JSON.stringify(currentNews, null, 4) + ";\n\n// Exporting for use in other scripts\nif (typeof module !== 'undefined' && module.exports) {\n    module.exports = defaultNewsData;\n} else {\n    window.newsData = defaultNewsData;\n}";
            const dataUri = 'data:application/javascript;charset=utf-8,' + encodeURIComponent(dataStr);

            const exportFileDefaultName = 'news-data.js';
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        // Live Preview on any input change
        document.querySelectorAll('.form-control').forEach(ctrl => {
            ctrl.addEventListener('input', updatePreview);
        });
    </script>
</body>

</html>
