<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBridge Admin - Manage Donation Causes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/auth-guard.js"></script>
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .list-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            height: fit-content;
        }

        .list-header {
            padding: 1rem;
            background: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-row {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .item-row:hover {
            background: #f1f5f9;
        }

        .item-row.active {
            background: #eff6ff;
            border-left: 4px solid var(--primary-color);
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-delete-small {
            color: #94a3b8;
            padding: 5px;
            transition: var(--transition);
            border-radius: 4px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .btn-delete-small:hover {
            color: #ef4444;
            background: #fee2e2;
        }

        .editor-card {
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-full {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
        }

        .btn-publish {
            background: #10b981;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            margin-top: 2rem;
        }

        .preview-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: var(--radius-lg);
        }
    </style>
</head>

<body style="background: #f1f5f9;">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-bridge-water"></i>
                Work<span>Bridge</span> <span
                    style="font-weight: 400; color: var(--text-secondary); margin-left:10px;">| Admin</span>
            </a>
            <div class="nav-links">
                <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-bottom: 4rem;">
        <header style="margin-top: 4rem; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 2.5rem; font-weight: 800;">Donation Posts</h1>
                <p style="color: var(--text-secondary);">Manage dynamic donation causes and funding goals.</p>
                <div style="margin-top: 1rem;">
                    <a href="admin-donations.html"
                        style="font-size: 0.9rem; color: var(--primary-color); text-decoration: none; font-weight: 600;">
                        <i class="fa-solid fa-list-check"></i> Go to Donor Records Management
                    </a>
                </div>
            </div>
            <button class="btn btn-primary" onclick="createNewItem()"><i class="fa-solid fa-plus"></i> Create Donation
                Post</button>
        </header>

        <div class="admin-layout">
            <!-- Sidebar: List of Causes -->
            <div class="list-card">
                <div class="list-header">
                    <span style="font-weight: 700;">All Causes</span>
                    <span id="item-count" class="badge">0</span>
                </div>
                <div id="item-list-container">
                    <!-- Loaded via JS -->
                </div>
            </div>

            <!-- Editor Side -->
            <div>
                <div class="editor-card">
                    <form id="editor-form">
                        <div class="form-grid">
                            <div class="form-group form-full">
                                <label>Cause Title</label>
                                <input type="text" id="item-title" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <select id="item-category" class="form-control">
                                    <option value="Urgent">Urgent</option>
                                    <option value="Ongoing">Ongoing</option>
                                    <option value="Critical">Critical</option>
                                    <option value="Completed">Completed</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select id="item-status" class="form-control">
                                    <option value="Active">Active</option>
                                    <option value="Paused">Paused</option>
                                    <option value="Hidden">Hidden</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Funding Goal (Rs)</label>
                                <input type="number" id="item-goal" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Raised Amount (Rs)</label>
                                <input type="number" id="item-raised" class="form-control" required>
                            </div>
                            <div class="form-group form-full">
                                <label>Image URL</label>
                                <input type="url" id="item-image" class="form-control" required>
                            </div>
                            <div class="form-group form-full">
                                <label>Description</label>
                                <textarea id="item-desc" class="form-control" rows="4" required></textarea>
                            </div>
                        </div>

                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="button" class="btn" style="flex: 1; border: 1px solid var(--border-color);"
                                onclick="deleteItem()">Delete Cause</button>
                            <button type="submit" class="btn btn-primary" style="flex: 2;">Save Changes</button>
                        </div>
                    </form>

                    <button class="btn-publish" onclick="publishAll()">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Publish to Live Site (Download donations-data.js)
                    </button>
                </div>

                <div class="preview-box">
                    <h4 style="margin-bottom: 1rem; color: var(--text-secondary);"><i class="fa-solid fa-eye"></i> Quick
                        Preview</h4>
                    <div id="quick-preview-container">
                        <!-- Preview Card -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/donations-data.js"></script>
    <script>
        let currentCauses = [];
        let activeId = null;

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('workbridge_donation_causes');
            if (saved) {
                currentCauses = JSON.parse(saved);
            } else if (window.donationCausesData) {
                currentCauses = [...window.donationCausesData];
            }

            renderList();
            if (currentCauses.length > 0) selectItem(currentCauses[0].id);
        });

        function renderList() {
            const container = document.getElementById('item-list-container');
            const countLabel = document.getElementById('item-count');
            countLabel.textContent = currentCauses.length;

            container.innerHTML = currentCauses.map(item => `
                <div class="item-row ${item.id === activeId ? 'active' : ''}" onclick="selectItem('${item.id}')">
                    <div class="item-content">
                        <div class="item-title">${item.title}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">${item.category} | Rs ${item.raised}</div>
                    </div>
                    <button class="btn-delete-small" onclick="event.stopPropagation(); deleteItem('${item.id}')">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `).join('');
        }

        function selectItem(id) {
            activeId = id;
            const item = currentCauses.find(n => n.id === id);
            if (!item) return;

            document.getElementById('item-title').value = item.title;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-status').value = item.status || 'Active';
            document.getElementById('item-goal').value = item.goal;
            document.getElementById('item-raised').value = item.raised;
            document.getElementById('item-image').value = item.image;
            document.getElementById('item-desc').value = item.description;

            renderList();
            updatePreview();
        }

        function createNewItem() {
            const newId = 'cause-' + Date.now();
            const newItem = {
                id: newId,
                title: "New Helping Cause",
                category: "Urgent",
                description: "Describe the cause and how it helps workers here...",
                image: "https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&q=80&w=600",
                goal: 100000,
                raised: 0,
                status: "Active"
            };
            currentCauses.unshift(newItem);
            activeId = newId;
            renderList();
            selectItem(newId);
        }

        function deleteItem(id = null) {
            const targetId = id || activeId;
            if (!targetId) return;

            if (!confirm('Are you sure you want to delete this cause?')) return;
            currentCauses = currentCauses.filter(n => n.id !== targetId);
            localStorage.setItem('workbridge_donation_causes', JSON.stringify(currentCauses));

            if (currentCauses.length > 0) {
                if (targetId === activeId) {
                    selectItem(currentCauses[0].id);
                } else {
                    renderList();
                }
            } else {
                activeId = null;
                document.getElementById('editor-form').reset();
                renderList();
            }
        }

        document.getElementById('editor-form').onsubmit = (e) => {
            e.preventDefault();
            const index = currentCauses.findIndex(n => n.id === activeId);
            if (index === -1) return;

            currentCauses[index] = {
                id: activeId,
                title: document.getElementById('item-title').value,
                category: document.getElementById('item-category').value,
                status: document.getElementById('item-status').value,
                goal: parseInt(document.getElementById('item-goal').value),
                raised: parseInt(document.getElementById('item-raised').value),
                image: document.getElementById('item-image').value,
                description: document.getElementById('item-desc').value
            };

            localStorage.setItem('workbridge_donation_causes', JSON.stringify(currentCauses));
            alert('Progress saved locally! Click Publish to update the live site data.');
            renderList();
            updatePreview();
        };

        function updatePreview() {
            const preview = document.getElementById('quick-preview-container');
            const title = document.getElementById('item-title').value;
            const cat = document.getElementById('item-category').value;
            const goal = parseInt(document.getElementById('item-goal').value) || 0;
            const raised = parseInt(document.getElementById('item-raised').value) || 0;
            const img = document.getElementById('item-image').value;
            const desc = document.getElementById('item-desc').value;

            const fundedPercent = Math.min(Math.round((raised / goal) * 100), 100) || 0;

            preview.innerHTML = `
                <div class="charity-card" style="margin: 0; max-width: 400px; box-shadow: var(--shadow-md);">
                    <img src="${img}" alt="Preview" class="charity-image">
                    <div class="charity-body">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <span class="badge" style="background: #fee2e2; color: #ef4444;">${cat}</span>
                            <span style="font-size: 0.8rem; color: var(--text-secondary);">${fundedPercent}% Funded</span>
                        </div>
                        <h3 class="charity-title" style="font-size: 1.1rem;">${title}</h3>
                        <p class="charity-desc" style="font-size: 0.9rem;">${desc}</p>
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${fundedPercent}%;"></div>
                            </div>
                            <div class="progress-stats">
                                <span>Raised: Rs ${raised.toLocaleString()}</span>
                                <span>Goal: Rs ${goal.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function publishAll() {
            const dataStr = "const defaultDonationCauses = " + JSON.stringify(currentCauses, null, 4) + ";\n\n// Exporting for use in other scripts\nif (typeof module !== 'undefined' && module.exports) {\n    module.exports = defaultDonationCauses;\n} else {\n    window.donationCausesData = defaultDonationCauses;\n}";
            const dataUri = 'data:application/javascript;charset=utf-8,' + encodeURIComponent(dataStr);

            const exportFileDefaultName = 'donations-data.js';
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        document.querySelectorAll('.form-control').forEach(ctrl => {
            ctrl.addEventListener('input', updatePreview);
        });
    </script>
</body>

</html>
