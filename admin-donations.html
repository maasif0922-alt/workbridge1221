<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBridge Admin - Donation Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/auth-guard.js"></script>
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .list-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            height: fit-content;
        }

        .list-header {
            padding: 1rem;
            background: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-row {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .item-row:hover {
            background: #f1f5f9;
        }

        .item-row.active {
            background: #eff6ff;
            border-left: 4px solid var(--primary-color);
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-delete-small {
            color: #94a3b8;
            padding: 5px;
            transition: var(--transition);
            border-radius: 4px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .btn-delete-small:hover {
            color: #ef4444;
            background: #fee2e2;
        }

        .editor-card {
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-full {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
        }

        .btn-publish {
            background: #10b981;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            margin-top: 2rem;
        }

        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-verified {
            background: #ecfdf5;
            color: #059669;
        }

        .status-pending {
            background: #fffbe6;
            color: #d4a017;
        }
    </style>
</head>

<body style="background: #f1f5f9;">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-bridge-water"></i>
                Work<span>Bridge</span> <span
                    style="font-weight: 400; color: var(--text-secondary); margin-left:10px;">| Admin</span>
            </a>
            <div class="nav-links">
                <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-bottom: 4rem;">
        <header style="margin-top: 4rem; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 2.5rem; font-weight: 800;">Donation Management</h1>
                <p style="color: var(--text-secondary);">Track and verify charity contributions.</p>
                <div style="margin-top: 1rem;">
                    <a href="admin-donation-posts.html"
                        style="font-size: 0.9rem; color: var(--primary-color); text-decoration: none; font-weight: 600;">
                        <i class="fa-solid fa-square-plus"></i> Manage Donation Posts (Causes)
                    </a>
                </div>
            </div>
            <button class="btn btn-primary" onclick="createNewDonation()"><i class="fa-solid fa-plus"></i> New
                Donation Record</button>
        </header>

        <div class="admin-layout">
            <!-- Sidebar: List of Donations -->
            <div class="list-card">
                <div class="list-header">
                    <span style="font-weight: 700;">Recent Contributions</span>
                    <span id="donation-count" class="badge">0</span>
                </div>
                <div id="donation-list-container">
                    <!-- Loaded via JS -->
                </div>
            </div>

            <!-- Editor Side -->
            <div>
                <div class="editor-card">
                    <form id="donation-form">
                        <div class="form-grid">
                            <div class="form-group form-full">
                                <label>Donor Name</label>
                                <input type="text" id="don-name" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Cause / Project</label>
                                <input type="text" id="don-cause" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Date</label>
                                <input type="text" id="don-date" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Amount</label>
                                <input type="text" id="don-amount" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Payment Method</label>
                                <select id="don-method" class="form-control">
                                    <option value="EasyPaisa">EasyPaisa</option>
                                    <option value="JazzCash">JazzCash</option>
                                    <option value="Bank Transfer">Bank Transfer</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select id="don-status" class="form-control">
                                    <option value="Pending">Pending</option>
                                    <option value="Verified">Verified</option>
                                </select>
                            </div>
                        </div>

                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="button" class="btn" style="flex: 1; border: 1px solid var(--border-color);"
                                onclick="deleteDonation()">Delete Record</button>
                            <button type="submit" class="btn btn-primary" style="flex: 2;">Save Changes</button>
                        </div>
                    </form>

                    <button type="button" class="btn-publish" onclick="verifyActiveDonation()" id="verify-btn">
                        <i class="fa-solid fa-check-double"></i> Verify and Send Thank You
                    </button>
                </div>

                <div
                    style="margin-top: 2rem; padding: 1.5rem; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: var(--radius-lg);">
                    <h4 style="margin-bottom: 1rem; color: var(--text-secondary);"><i
                            class="fa-solid fa-circle-info"></i> Fast Actions</h4>
                    <p style="font-size: 0.9rem; color: var(--text-secondary);">Verifying a donation will automatically
                        open WhatsApp with a thank you message for the donor.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDonations = [];
        let activeId = null;

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('workbridge_pending_donations');
            if (saved) {
                currentDonations = JSON.parse(saved);
            }

            renderList();
            if (currentDonations.length > 0) selectDonation(0); // Using index as ID for simplicity in this legacy structure
        });

        function renderList() {
            const container = document.getElementById('donation-list-container');
            const countLabel = document.getElementById('donation-count');
            countLabel.textContent = currentDonations.length;

            if (currentDonations.length === 0) {
                container.innerHTML = '<div style="padding:2rem; text-align:center; color:var(--text-secondary);">No records.</div>';
                return;
            }

            container.innerHTML = currentDonations.map((item, index) => `
                <div class="item-row ${index === activeId ? 'active' : ''}" onclick="selectDonation(${index})">
                    <div class="item-content">
                        <div class="item-title">${item.name}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">${item.date} | ${item.amount}</div>
                        <span class="status-badge ${item.status === 'Verified' ? 'status-verified' : 'status-pending'}">${item.status}</span>
                    </div>
                    <button class="btn-delete-small" onclick="event.stopPropagation(); deleteDonation(${index})">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `).join('');
        }

        function selectDonation(index) {
            activeId = index;
            const item = currentDonations[index];
            if (!item) return;

            document.getElementById('don-name').value = item.name;
            document.getElementById('don-cause').value = item.cause;
            document.getElementById('don-date').value = item.date;
            document.getElementById('don-amount').value = item.amount;
            document.getElementById('don-method').value = item.method;
            document.getElementById('don-status').value = item.status;

            const verifyBtn = document.getElementById('verify-btn');
            if (item.status === 'Verified') {
                verifyBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Re-send Thank You Notice';
                verifyBtn.style.background = '#6366f1';
            } else {
                verifyBtn.innerHTML = '<i class="fa-solid fa-check-double"></i> Verify and Send Thank You';
                verifyBtn.style.background = '#10b981';
            }

            renderList();
        }

        function createNewDonation() {
            const newItem = {
                name: "New Donor",
                cause: "General Fund",
                date: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }),
                amount: "Rs. 0",
                method: "EasyPaisa",
                status: "Pending"
            };
            currentDonations.unshift(newItem);
            activeId = 0;
            renderList();
            selectDonation(0);
        }

        function deleteDonation(index = null) {
            const targetIndex = index !== null ? index : activeId;
            if (targetIndex === null || !currentDonations[targetIndex]) return;

            if (!confirm('Are you sure you want to delete this donation record?')) return;
            currentDonations.splice(targetIndex, 1);
            localStorage.setItem('workbridge_pending_donations', JSON.stringify(currentDonations));

            if (currentDonations.length > 0) {
                selectDonation(0);
            } else {
                activeId = null;
                document.getElementById('donation-form').reset();
            }
            renderList();
        }

        document.getElementById('donation-form').onsubmit = (e) => {
            e.preventDefault();
            if (activeId === null) return;

            currentDonations[activeId] = {
                name: document.getElementById('don-name').value,
                cause: document.getElementById('don-cause').value,
                date: document.getElementById('don-date').value,
                amount: document.getElementById('don-amount').value,
                method: document.getElementById('don-method').value,
                status: document.getElementById('don-status').value
            };

            localStorage.setItem('workbridge_pending_donations', JSON.stringify(currentDonations));
            alert('Donation record updated!');
            renderList();
            selectDonation(activeId);
        };

        function verifyActiveDonation() {
            if (activeId === null) return;
            const item = currentDonations[activeId];

            if (item.status !== 'Verified') {
                item.status = 'Verified';
                localStorage.setItem('workbridge_pending_donations', JSON.stringify(currentDonations));
                renderList();
                selectDonation(activeId);
            }

            const message = `Assalam-o-Alaikum ${item.name}! WorkBridge Foundation ki taraf se aapka bohat shukria. Hame aapki donation moosool ho chuki hai cause: *${item.cause}* k liye. JazakAllah Khair! 🌟`;
            const waUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(waUrl, '_blank');
        }
    </script>
</body>

</html>
