<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBridge Admin - Earning Payments</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/auth-guard.js"></script>
    <style>
        .admin-card {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            margin-top: 2rem;
        }

        .payment-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .payment-table th,
        .payment-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .payment-table th {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .status-active {
            background: #eff6ff;
            color: #2563eb;
        }

        .status-pending {
            background: #fffbe6;
            color: #d4a017;
        }
    </style>
</head>

<body style="background: #f1f5f9;">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-bridge-water"></i>
                Work<span>Bridge</span> <span
                    style="font-weight: 400; color: var(--text-secondary); margin-left:10px;">| Admin</span>
            </a>
            <div class="nav-links">
                <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header style="margin-top: 4rem;">
            <h1 style="font-size: 2.5rem; font-weight: 800;">Earning Plan Payments</h1>
            <p style="color: var(--text-secondary);">Manage users joining the Global Investment & Premium Plans.</p>
        </header>

        <div class="admin-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="font-size: 1.25rem;">Active Join Requests</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="text" placeholder="Search Investor ID..."
                        style="padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 8px;">
                    <button class="btn btn-primary">Search</button>
                </div>
            </div>

            <table class="payment-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User ID/Name</th>
                        <th>Plan Name</th>
                        <th>Amount</th>
                        <th>Cycle</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="investment-list">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadInvestments() {
            const list = document.getElementById('investment-list');
            const investments = JSON.parse(localStorage.getItem('workbridge_pending_investments') || '[]');

            if (investments.length === 0) {
                list.innerHTML = '<tr><td colspan="7" style="text-align:center;">No investment records found.</td></tr>';
                return;
            }

            list.innerHTML = investments.map((inv, index) => `
                <tr>
                    <td>${inv.date}</td>
                    <td>${inv.userName}</td>
                    <td>${inv.plan}</td>
                    <td>$${inv.amount}</td>
                    <td>${inv.cycle}</td>
                    <td><span class="status-badge ${inv.status === 'Active' ? 'status-active' : 'status-pending'}">${inv.status}</span></td>
                    <td>
                        ${inv.status !== 'Active' ?
                    `<button class="btn btn-primary btn-sm" onclick="processInvestment(${index})">Activate</button>` :
                    `<button class="btn btn-secondary btn-sm" onclick="sendWelcome('${inv.userName}', '${inv.plan}')">Re-send Welcome</button>`
                }
                        <button class="btn btn-sm" onclick="deleteInvestment(${index})" style="background:#fee2e2; color:#991b1b; margin-left:5px;"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function processInvestment(index) {
            const investments = JSON.parse(localStorage.getItem('workbridge_pending_investments') || '[]');
            investments[index].status = 'Active';
            localStorage.setItem('workbridge_pending_investments', JSON.stringify(investments));

            alert('Investment Activated! Opening WhatsApp to send Welcome message and Dashboard credentials...');
            sendWelcome(investments[index].userName, investments[index].plan);
            loadInvestments();
        }

        function sendWelcome(name, plan) {
            const message = `Congratulations ${name}! WorkBridge Admin ki taraf se aapka premium status activate kar diya gaya hai. Aapka *${plan}* plan active hai. Ab aapke applications TOP par show honge! JazakAllah! 🚀`;
            const waUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(waUrl, '_blank');
        }

        function deleteInvestment(index) {
            if (confirm('Are you sure you want to delete this record?')) {
                const investments = JSON.parse(localStorage.getItem('workbridge_pending_investments') || '[]');
                investments.splice(index, 1);
                localStorage.setItem('workbridge_pending_investments', JSON.stringify(investments));
                loadInvestments();
            }
        }

        document.addEventListener('DOMContentLoaded', loadInvestments);
    </script>
</body>

</html>
